# ============================================================
# JULABA — Nginx Virtual Host
# Remplacer julaba.online par ton domaine réel
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name julaba.online www.julaba.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Principal ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name julaba.online www.julaba.online;

    # ── Certificats SSL (Let's Encrypt) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/julaba.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/julaba.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Headers de sécurité ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API Backend NestJS ───────────────────────────────────
    location /api/ {
        proxy_pass         http://julaba_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend React (SPA) ─────────────────────────────────
    location / {
        proxy_pass         http://julaba_frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Important pour React Router (SPA)
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://julaba_frontend:80/index.html;
    }
}
