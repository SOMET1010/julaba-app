services:
  backend:
    build: ./backend
    container_name: julaba_backend
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env.production
    volumes:
      - /usr/local/bin/piper-tts:/usr/local/bin/piper-tts:ro
      - /var/www/julaba/piper-voices:/var/www/julaba/piper-voices:ro
      - /tmp/piper-cache:/tmp/piper-cache
      - /var/www/julaba/uploads:/var/www/julaba/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: julaba_frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf

networks:
  default:
    name: julaba_network
